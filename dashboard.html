<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrderTaker — Kitchen Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF6B35">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/ot-icon-96.png">
<style>
:root{
  --bg:#0D0604;--card:#1A0E08;--card2:#220F08;--border:rgba(255,107,53,.15);
  --accent:#FF6B35;--accent2:#E0541F;--text:#FFF5EE;--text2:#A8897A;
  --green:#4ADE80;--yellow:#FBBF24;--blue:#60A5FA;--red:#F87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;min-height:100vh}

/* HEADER */
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{font-size:20px;font-weight:800}
.logo span{color:var(--accent)}
.status-row{display:flex;align-items:center;gap:14px}
.live-badge{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--green)}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.restaurant-name{font-size:13px;color:var(--text2)}

/* STATS BAR */
.stats{display:flex;padding:18px 24px;gap:14px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat{flex:1;min-width:120px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-right:14px}
.stat:last-child{margin-right:0}
.stat-val{font-size:28px;font-weight:900;letter-spacing:-1px}
.stat-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.stat-val.green{color:var(--green)}
.stat-val.accent{color:var(--accent)}
.stat-val.yellow{color:var(--yellow)}

/* COLUMNS */
.board{display:flex;padding:20px;gap:16px;align-items:flex-start}
.column{flex:1;min-width:280px;margin-right:16px}
.column:last-child{margin-right:0}
.col-header{display:flex;align-items:center;justify-content:space-between;padding:0 4px 14px}
.col-title{font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.col-count{background:var(--card2);border-radius:12px;padding:3px 10px;font-size:12px;font-weight:700;color:var(--text2)}
.col-title.new{color:var(--accent)}
.col-title.prep{color:var(--yellow)}
.col-title.ready{color:var(--green)}

/* ORDER CARD */
.order-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;transition:border-color .2s}
.order-card.new{border-left:3px solid var(--accent)}
.order-card.prep{border-left:3px solid var(--yellow)}
.order-card.ready{border-left:3px solid var(--green)}
.order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.order-id{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:.5px}
.order-time{font-size:11px;color:var(--text2)}
.order-customer{font-size:15px;font-weight:800;margin-bottom:2px}
.order-phone{font-size:12px;color:var(--text2);margin-bottom:10px}
.order-type{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:800;letter-spacing:.5px;padding:3px 9px;border-radius:8px;margin-bottom:10px}
.type-pickup{background:rgba(96,165,250,.12);color:var(--blue)}
.type-delivery{background:rgba(167,139,250,.12);color:#A78BFA}
.type-reservation{background:rgba(74,222,128,.12);color:var(--green)}
.order-items{margin-bottom:10px}
.item-line{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.item-line:last-child{border-bottom:none}
.item-line.upsell{color:var(--green)}
.item-line.upsell .item-name::before{content:'✨ '}
.order-total{display:flex;justify-content:space-between;font-size:14px;font-weight:800;padding-top:8px;border-top:1px solid var(--border);margin-bottom:12px}
.order-notes{font-size:12px;color:var(--text2);background:var(--card2);border-radius:8px;padding:8px 10px;margin-bottom:12px;line-height:1.5}
.order-actions{display:flex}
.action-btn{flex:1;padding:10px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;border:none;transition:opacity .15s;margin-right:8px}
.action-btn:last-child{margin-right:0}
.action-btn.primary{background:var(--accent);color:#1a0a00}
.action-btn.primary:hover{opacity:.85}
.action-btn.secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.action-btn.secondary:hover{border-color:var(--accent)}
.action-btn.success{background:var(--green);color:#052e16}

/* RESERVATIONS PANEL */
.reservations{padding:0 20px 30px}
.res-header{font-size:13px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--green);margin-bottom:14px}
.res-list{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.res-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}
.res-row:last-child{border-bottom:none}
.res-time{font-size:14px;font-weight:800;width:80px;flex-shrink:0;color:var(--accent)}
.res-info{flex:1}
.res-name{font-size:14px;font-weight:700}
.res-meta{font-size:12px;color:var(--text2);margin-top:2px}
.res-party{background:var(--card2);border-radius:8px;padding:4px 12px;font-size:12px;font-weight:700;flex-shrink:0}

@media(max-width:900px){
  .board{flex-direction:column}
  .column{margin-right:0;margin-bottom:8px;min-width:auto}
  .stats{flex-wrap:wrap}
  .stat{min-width:45%;margin-right:8px;margin-bottom:8px}
}
</style>
</head>
<body>

<header>
  <div class="logo" style="display:flex;align-items:center;gap:8px"><img src="icons/ot-icon-72.png" alt="" style="width:26px;height:26px;border-radius:6px">Order<span>Taker</span> — Kitchen</div>
  <div class="status-row">
    <span class="restaurant-name">Cairo Kitchen · Jersey City, NJ</span>
    <div class="live-badge"><span class="live-dot"></span> LIVE</div>
  </div>
</header>

<div class="stats">
  <div class="stat">
    <div class="stat-val accent" id="stat-new">0</div>
    <div class="stat-label">New Orders</div>
  </div>
  <div class="stat">
    <div class="stat-val yellow" id="stat-prep">0</div>
    <div class="stat-label">Preparing</div>
  </div>
  <div class="stat">
    <div class="stat-val green" id="stat-avg">$0.00</div>
    <div class="stat-label">Avg. Order Today</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="stat-calls">0</div>
    <div class="stat-label">Calls Answered Today</div>
  </div>
  <div class="stat">
    <div class="stat-val green" id="stat-upsell">$0</div>
    <div class="stat-label">Upsell Revenue Today</div>
  </div>
</div>

<div class="board" id="board">

  <!-- NEW ORDERS -->
  <div class="column" data-status="new">
    <div class="col-header">
      <span class="col-title new">🔴 New</span>
      <span class="col-count">0</span>
    </div>
    <div class="col-body"></div>
  </div>

  <!-- PREPARING -->
  <div class="column" data-status="preparing">
    <div class="col-header">
      <span class="col-title prep">🟡 Preparing</span>
      <span class="col-count">0</span>
    </div>
    <div class="col-body"></div>
  </div>

  <!-- READY -->
  <div class="column" data-status="ready">
    <div class="col-header">
      <span class="col-title ready">🟢 Ready / Out</span>
      <span class="col-count">0</span>
    </div>
    <div class="col-body"></div>
  </div>

</div>

<!-- RESERVATIONS -->
<div class="reservations">
  <div class="res-header">📅 Today's Reservations</div>
  <div class="res-list" id="res-list">
    <div class="res-row"><div class="res-info"><div class="res-meta">Loading reservations…</div></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://hvyfeebazmiqateniupm.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2eWZlZWJhem1pcWF0ZW5pdXBtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMTI2MTcsImV4cCI6MjA5NTY4ODYxN30.89qqEshOwp1bU2AQbzSpZ36_TuqP2jVULo_9Ug-S9_c';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let RESTAURANT_ID = null;
let ITEMS_BY_ORDER = {};

const STATUS_META = {
  new: { icon:'📦', delivery:'🛵' },
};

function timeAgo(ts) {
  const diffMs = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'Just now';
  if (mins === 1) return '1 min ago';
  if (mins < 60) return `${mins} min ago`;
  const hrs = Math.floor(mins / 60);
  return `${hrs}h ${mins % 60}m ago`;
}

function orderCardHTML(order) {
  const items = ITEMS_BY_ORDER[order.id] || [];
  const typeLabel = order.order_type === 'pickup'
    ? '<span class="order-type type-pickup">📦 PICKUP</span>'
    : '<span class="order-type type-delivery">🛵 DELIVERY</span>';

  const itemsHtml = items.map(it => {
    const cls = it.is_upsell ? 'item-line upsell' : 'item-line';
    return `<div class="${cls}"><span class="item-name">${it.quantity}× ${it.item_name}</span><span>$${Number(it.line_total).toFixed(2)}</span></div>`;
  }).join('');

  let notes = order.notes || '';
  if (order.order_type === 'delivery' && order.delivery_address) {
    notes = `📍 Deliver to: ${order.delivery_address}` + (order.notes ? ` · ${order.notes}` : '');
  } else if (order.notes) {
    notes = `📞 ${order.notes}`;
  }
  if (order.wait_time_minutes && order.status !== 'ready') {
    notes += (notes ? ' · ' : '') + `⏱️ Quoted: ready in ~${order.wait_time_minutes} min`;
  }

  let actionsHtml = '';
  if (order.status === 'new') {
    actionsHtml = `<button class="action-btn primary" onclick="moveOrder('${order.id}','preparing')">Start Preparing</button>`;
  } else if (order.status === 'preparing') {
    actionsHtml = `
      <button class="action-btn success" onclick="moveOrder('${order.id}','ready')">Mark Ready</button>
      <button class="action-btn secondary" onclick="moveOrder('${order.id}','new')">↩ Back</button>`;
  } else if (order.status === 'ready') {
    actionsHtml = `<button class="action-btn secondary" onclick="moveOrder('${order.id}','completed')">Mark Picked Up ✓</button>`;
  }

  const cardClass = order.status === 'preparing' ? 'prep' : order.status;

  return `<div class="order-card ${cardClass}" data-id="${order.id}">
    <div class="order-top">
      <span class="order-id">#${1000 + order.order_number}</span>
      <span class="order-time">${timeAgo(order.created_at)}</span>
    </div>
    <div class="order-customer">${order.customer_name}</div>
    <div class="order-phone">${order.customer_phone}</div>
    ${typeLabel}
    <div class="order-items">${itemsHtml}</div>
    <div class="order-total"><span>Total</span><span>$${Number(order.total).toFixed(2)}</span></div>
    ${notes ? `<div class="order-notes">${notes}</div>` : ''}
    <div class="order-actions">${actionsHtml}</div>
  </div>`;
}

async function loadOrders() {
  const { data: orders, error } = await sb
    .from('ot_orders')
    .select('*')
    .eq('restaurant_id', RESTAURANT_ID)
    .in('status', ['new','preparing','ready'])
    .order('created_at', { ascending: true });

  if (error) { console.error(error); return; }

  const orderIds = orders.map(o => o.id);
  if (orderIds.length) {
    const { data: items } = await sb
      .from('ot_order_items')
      .select('*')
      .in('order_id', orderIds);
    ITEMS_BY_ORDER = {};
    (items || []).forEach(it => {
      (ITEMS_BY_ORDER[it.order_id] ||= []).push(it);
    });
  }

  const cols = { new: [], preparing: [], ready: [] };
  orders.forEach(o => cols[o.status]?.push(o));

  document.querySelectorAll('.column').forEach(col => {
    const status = col.dataset.status;
    const body = col.querySelector('.col-body');
    const list = cols[status] || [];
    body.innerHTML = list.length
      ? list.map(orderCardHTML).join('')
      : `<div style="font-size:13px;color:var(--text2);padding:20px 0;text-align:center">No orders</div>`;
    col.querySelector('.col-count').textContent = list.length;
  });

  document.getElementById('stat-new').textContent = cols.new.length;
  document.getElementById('stat-prep').textContent = cols.preparing.length;
}

async function moveOrder(orderId, newStatus) {
  const card = document.querySelector(`.order-card[data-id="${orderId}"]`);
  if (card) { card.style.transition = 'opacity .25s'; card.style.opacity = '0'; }
  const { error } = await sb.from('ot_orders').update({ status: newStatus, updated_at: new Date().toISOString() }).eq('id', orderId);
  if (error) console.error(error);
  setTimeout(loadOrders, 250);
}

async function loadStats() {
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);

  const { data: todayOrders } = await sb
    .from('ot_orders')
    .select('total,upsell_total')
    .eq('restaurant_id', RESTAURANT_ID)
    .gte('created_at', todayStart.toISOString());

  if (todayOrders && todayOrders.length) {
    const totalSum = todayOrders.reduce((s,o) => s + Number(o.total), 0);
    const upsellSum = todayOrders.reduce((s,o) => s + Number(o.upsell_total||0), 0);
    document.getElementById('stat-avg').textContent = '$' + (totalSum/todayOrders.length).toFixed(2);
    document.getElementById('stat-upsell').textContent = '$' + upsellSum.toFixed(0);
  }

  const { count } = await sb
    .from('ot_call_log')
    .select('*', { count: 'exact', head: true })
    .eq('restaurant_id', RESTAURANT_ID)
    .gte('created_at', todayStart.toISOString());
  document.getElementById('stat-calls').textContent = count || 0;
}

async function loadReservations() {
  const today = new Date().toISOString().slice(0,10);
  const { data: res, error } = await sb
    .from('ot_reservations')
    .select('*')
    .eq('restaurant_id', RESTAURANT_ID)
    .eq('reservation_date', today)
    .order('reservation_time', { ascending: true });

  const list = document.getElementById('res-list');
  if (error || !res || !res.length) {
    list.innerHTML = `<div class="res-row"><div class="res-info"><div class="res-meta">No reservations for today</div></div></div>`;
    return;
  }
  list.innerHTML = res.map(r => {
    const [h,m] = r.reservation_time.split(':');
    const hour = ((+h + 11) % 12) + 1;
    const ampm = +h >= 12 ? 'PM' : 'AM';
    const timeStr = `${hour}:${m} ${ampm}`;
    return `<div class="res-row">
      <div class="res-time">${timeStr}</div>
      <div class="res-info">
        <div class="res-name">${r.customer_name}</div>
        <div class="res-meta">${r.customer_phone}${r.special_requests ? ' · ' + r.special_requests : ''}</div>
      </div>
      <div class="res-party">${r.party_size} guests</div>
    </div>`;
  }).join('');
}

async function init() {
  const { data: rest, error } = await sb
    .from('ot_restaurants')
    .select('id,name,city')
    .eq('name', 'Cairo Kitchen')
    .limit(1)
    .single();

  if (error || !rest) { console.error('Could not load restaurant', error); return; }
  RESTAURANT_ID = rest.id;
  document.querySelector('.restaurant-name').textContent = `${rest.name} · ${rest.city}`;

  await loadOrders();
  await loadStats();
  await loadReservations();

  // Realtime: refresh whenever orders change
  sb.channel('ot_orders_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'ot_orders', filter: `restaurant_id=eq.${RESTAURANT_ID}` },
      () => { loadOrders(); loadStats(); })
    .subscribe();

  // Refresh "time ago" labels periodically
  setInterval(loadOrders, 30000);
}

init();
</script>
<script src="support-widget.js"></script>
</body>
</html>
